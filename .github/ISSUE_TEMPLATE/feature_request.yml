name: Feature request
description: Suggest an idea for Fonos.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What friction or gap are you running into?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: >
        What would you like to happen? If it fits the recipe model (input →
        processing → output), say which layer it touches.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you considered.
    validations:
      required: false
