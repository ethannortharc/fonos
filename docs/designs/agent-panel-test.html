<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agent Panel Test Harness</title>
<style>
  body{margin:0;background:#333;font-family:system-ui}
  .harness{display:flex;gap:20px;padding:20px;align-items:flex-start}
  .preview{width:360px;height:500px;background:#1a1a1a;border-radius:8px;overflow:hidden;position:relative}
  .preview iframe{width:100%;height:100%;border:0}
  .controls{width:260px;display:flex;flex-direction:column;gap:8px}
  .controls button{
    padding:8px 14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);
    color:#fff;border-radius:8px;font-size:12px;cursor:pointer;text-align:left;font-family:inherit;
  }
  .controls button:hover{background:rgba(255,255,255,.1)}
  .controls h3{font-size:12px;color:rgba(255,255,255,.4);margin:8px 0 4px;font-weight:500}
  .log{font-size:10px;color:rgba(255,255,255,.3);font-family:monospace;max-height:200px;overflow-y:auto;background:rgba(0,0,0,.3);padding:8px;border-radius:6px;margin-top:8px}
</style>
</head>
<body>
<div class="harness">
  <div>
    <div style="font-size:11px;color:rgba(255,255,255,.3);margin-bottom:8px;letter-spacing:.1em;text-transform:uppercase">Agent Panel Preview (340x500)</div>
    <div class="preview" id="preview">
      <iframe id="frame" src="../../fonos-app/public/agent-panel.html"></iframe>
    </div>
  </div>
  <div class="controls">
    <h3>Simulate Hotkey 1 (Speak to Agent)</h3>
    <button onclick="simFlow()">Full flow: Record -> Transcript -> Think -> Response</button>
    <button onclick="emit('agent-panel:recording',null)">1. Start Recording</button>
    <button onclick="emit('agent-panel:recording-stop',null)">2. Stop Recording</button>
    <button onclick="emit('agent-panel:user-message',{text:'What is my IP address?'})">3. User Message</button>
    <button onclick="emit('agent-panel:thinking',null)">4. Thinking</button>
    <button onclick="emit('agent-panel:skill-execution',{skill_name:'shell',params:{command:'ifconfig | grep inet'},latency_ms:38,blocked:false})">5. Skill Execution</button>
    <button onclick="emit('agent-panel:response',{text:'Your local IP is 192.168.1.42 on en0 (Wi-Fi).'})">6. Response</button>

    <h3>Simulate Hotkey 2 (Persistent)</h3>
    <button onclick="emit('agent-panel:show',{persistent:true})">Show Persistent</button>
    <button onclick="emit('agent-panel:hide',null)">Hide</button>

    <h3>Other</h3>
    <button onclick="emit('agent-panel:error',{text:'Agent error: No LLM configured'})">Error</button>
    <button onclick="emit('agent-panel:dismiss',null)">Dismiss</button>
    <button onclick="emit('agent-panel:clear',null)">Clear</button>

    <div class="log" id="log"></div>
  </div>
</div>
<script>
var frame = document.getElementById('frame');

function log(msg) {
  var el = document.getElementById('log');
  el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}

// Fake the Tauri internals so the panel thinks it's in Tauri
frame.onload = function() {
  var win = frame.contentWindow;
  var listeners = {};
  var callbackId = 1000;
  var callbackFns = {}; // store the actual functions

  win.__TAURI_INTERNALS__ = {
    invoke: function(cmd, args) {
      log('invoke: ' + cmd + ' ' + JSON.stringify(args||{}).slice(0,80));
      if (cmd === 'plugin:event|listen') {
        var handlerId = args.handler;
        var event = args.event;
        if (!listeners[event]) listeners[event] = [];
        // The handler ID points to a function stored on the window by transformCallback
        listeners[event].push(handlerId);
        log('  -> registered listener for ' + event + ' (handler=' + handlerId + ')');
        return Promise.resolve(handlerId);
      }
      if (cmd === 'resize_agent_panel') return Promise.resolve();
      if (cmd === 'hide_agent_panel') { log('  -> HIDE'); return Promise.resolve(); }
      if (cmd === 'agent_reset') { log('  -> RESET'); return Promise.resolve(); }
      if (cmd === 'agent_process') {
        log('  -> agent_process: ' + (args.text||''));
        setTimeout(function(){
          emit('agent-panel:skill-execution', {skill_name:'shell',params:{command:'ifconfig'},latency_ms:42,blocked:false});
          setTimeout(function(){
            emit('agent-panel:response', {text:'Your local IP is 192.168.1.42'});
          }, 300);
        }, 800);
        return Promise.resolve({response_text:'',skill_executions:[]});
      }
      return Promise.resolve();
    },
    transformCallback: function(fn) {
      var id = callbackId++;
      // Store the function so we can call it later
      callbackFns[id] = fn;
      // Also store on window as Tauri does
      win['_' + id] = fn;
      return id;
    }
  };

  window._tauriListeners = listeners;
  window._tauriCallbackFns = callbackFns;
  window._tauriWin = win;

  log('Tauri internals injected, waiting for panel setup...');
  setTimeout(function(){ log('Ready! Listeners: ' + Object.keys(listeners).join(', ')); }, 500);
};

function emit(event, payload) {
  log('EMIT: ' + event + ' ' + JSON.stringify(payload||null).slice(0,80));
  var listeners = window._tauriListeners;
  var fns = window._tauriCallbackFns;
  if (!listeners || !listeners[event] || listeners[event].length === 0) {
    log('  WARNING: no listeners for ' + event + ' (registered events: ' + (listeners ? Object.keys(listeners).join(',') : 'none') + ')');
    return;
  }
  listeners[event].forEach(function(handlerId) {
    var fn = fns[handlerId];
    if (fn) {
      log('  -> calling handler ' + handlerId);
      fn({payload: payload});
    } else {
      log('  WARNING: handler fn ' + handlerId + ' not found in callbackFns');
    }
  });
}

function simFlow() {
  log('=== Simulating full agent flow ===');
  emit('agent-panel:recording', null);
  setTimeout(function(){ emit('agent-panel:recording-stop', null); }, 2000);
  setTimeout(function(){ emit('agent-panel:user-message', {text:'What is my IP address?'}); }, 2200);
  setTimeout(function(){ emit('agent-panel:thinking', null); }, 2400);
  setTimeout(function(){ emit('agent-panel:skill-execution', {skill_name:'shell',params:{command:'ifconfig | grep inet'},latency_ms:38,blocked:false}); }, 3500);
  setTimeout(function(){ emit('agent-panel:response', {text:'Your local IP is 192.168.1.42 on en0 (Wi-Fi).'}); }, 3800);
}
</script>
</body>
</html>
