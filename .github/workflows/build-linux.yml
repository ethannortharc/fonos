name: Build Linux Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: amd64
          - runner: ubuntu-22.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libasound2-dev \
            rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend dependencies
        working-directory: fonos-desktop
        run: npm ci

      - name: Create placeholder resources
        run: |
          touch fonos-desktop/src-tauri/resources/fonos-audio-capture
          touch fonos-desktop/src-tauri/resources/fonos-stt-apple
          python3 -c "
          import struct, zlib, os
          def make_png(w, h):
              raw = b''
              for y in range(h):
                  raw += b'\x00'
                  for x in range(w):
                      raw += b'\xf5\x9e\x0b\xff'
              c = zlib.compress(raw)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)
              def chunk(t, d):
                  return struct.pack('>I', len(d)) + t + d + struct.pack('>I', zlib.crc32(t + d) & 0xffffffff)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', c) + chunk(b'IEND', b'')
          d = 'fonos-desktop/src-tauri/resources'
          for name, size in [('tray_icon', 32), ('icon_32x32', 32), ('icon_128x128', 128), ('icon_256x256', 256), ('icon_512x512', 512), ('icon_1024x1024', 1024)]:
              p = os.path.join(d, name + '.png')
              if not os.path.exists(p) or os.path.getsize(p) == 0:
                  open(p, 'wb').write(make_png(size, size))
                  print(f'Generated {p} ({size}x{size})')
          "

      - name: Build Tauri app (deb + rpm)
        working-directory: fonos-desktop
        run: cargo tauri build --bundles deb,rpm

      - name: List build artifacts
        run: |
          echo "=== DEB ==="
          find target/release/bundle/deb -name "*.deb" -exec ls -lh {} \;
          echo "=== RPM ==="
          find target/release/bundle/rpm -name "*.rpm" -exec ls -lh {} \;

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: fonos-deb-${{ matrix.arch }}
          path: target/release/bundle/deb/*.deb

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: fonos-rpm-${{ matrix.arch }}
          path: target/release/bundle/rpm/*.rpm

      - name: Upload to release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          for f in target/release/bundle/deb/*.deb target/release/bundle/rpm/*.rpm; do
            gh release upload "$TAG_NAME" "$f" --clobber
          done
