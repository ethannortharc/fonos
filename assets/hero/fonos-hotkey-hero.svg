<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2540" height="1520" viewBox="0 0 2540 1520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16130f"/>
      <stop offset="0.46" stop-color="#10100e"/>
      <stop offset="1" stop-color="#080807"/>
    </linearGradient>
    <radialGradient id="amberGlow" cx="24%" cy="23%" r="48%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.23"/>
      <stop offset="0.44" stop-color="#f59e0b" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="82%" cy="28%" r="38%">
      <stop offset="0" stop-color="#86efac" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#86efac" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="64%" cy="72%" r="42%">
      <stop offset="0" stop-color="#c084fc" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="44" stdDeviation="36" flood-color="#000000" flood-opacity="0.52"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="amberShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#f59e0b" flood-opacity="0.28"/>
    </filter>
    <style>
      .ui{font-family:Arial,Helvetica,sans-serif}
      .mono{font-family:Menlo,Consolas,monospace}
      .kicker{font-size:25px;font-weight:800;letter-spacing:5px}
      .headline{font-size:82px;font-weight:820;letter-spacing:-1px}
      .sub{font-size:30px;line-height:1.55}
      .label{font-size:19px;font-weight:800;letter-spacing:3px}
      .body{font-size:27px}
      .small{font-size:23px}
      .tiny{font-size:19px}
      .micro{font-size:16px}
      .panelTitle{font-size:25px;font-weight:760}
      .bubble{font-size:22px;line-height:1.5}
      .hotkey{font-size:22px;font-weight:760}
      .muted{fill:rgba(255,255,255,.52)}
      .soft{fill:rgba(255,255,255,.32)}
      .faint{fill:rgba(255,255,255,.18)}
      .amber{fill:#fbbf24}
      .white{fill:#fafaf9}
    </style>
  </defs>

  <rect width="2540" height="1520" fill="url(#bg)"/>
  <rect width="2540" height="1520" fill="url(#amberGlow)"/>
  <rect width="2540" height="1520" fill="url(#greenGlow)"/>
  <rect width="2540" height="1520" fill="url(#violetGlow)"/>

  <g class="ui">
    <g transform="translate(130 126)">
      <text class="kicker amber">HOTKEY-FIRST VOICE WORKFLOW</text>
      <text class="headline white" x="0" y="108">Talk. It types. Anywhere.</text>
      <text class="sub muted" x="2" y="168">Fonos lives under global shortcuts: summon a tiny floating surface, speak,</text>
      <text class="sub muted" x="2" y="216">and route clean text to your cursor, notes, meetings, or an agent.</text>
    </g>

    <g transform="translate(152 416)" filter="url(#softShadow)">
      <rect width="780" height="662" rx="54" fill="rgba(255,255,255,.036)" stroke="rgba(255,255,255,.075)" stroke-width="2"/>
      <rect x="54" y="48" width="672" height="558" rx="40" fill="rgba(12,12,10,.28)" stroke="rgba(255,255,255,.04)" stroke-width="1.5"/>

      <g transform="translate(256 78)">
        <rect width="268" height="260" rx="30" fill="rgba(26,25,23,.97)" stroke="rgba(255,255,255,.09)" stroke-width="2"/>
        <rect x="22" y="78" width="224" height="61" rx="16" fill="rgba(245,158,11,.12)" stroke="rgba(245,158,11,.24)" stroke-width="2"/>
        <text class="small soft" x="48" y="54">Raw</text>
        <text class="small amber" x="48" y="117" font-weight="760">Polish</text>
        <circle cx="212" cy="104" r="5" fill="#fbbf24" opacity=".84"/>
        <text class="small soft" x="48" y="181">Translate</text>
        <line x1="26" y1="205" x2="242" y2="205" stroke="rgba(255,255,255,.065)" stroke-width="2"/>
        <text class="small soft" x="48" y="238">Settings</text>
      </g>

      <g transform="translate(304 412)" filter="url(#amberShadow)">
        <rect width="172" height="52" rx="26" fill="rgba(26,25,23,.9)" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
        <circle cx="29" cy="26" r="5" fill="#fbbf24" opacity=".45"/>
        <text class="tiny amber" x="57" y="33" font-weight="900" letter-spacing="2">FONOS</text>
        <circle cx="144" cy="26" r="5" fill="#fbbf24" opacity=".45"/>
      </g>

      <g transform="translate(268 490)">
        <rect width="244" height="54" rx="27" fill="rgba(26,25,23,.96)" stroke="rgba(255,69,58,.2)" stroke-width="2"/>
        <circle cx="31" cy="27" r="8" fill="#ff453a"/>
        <rect x="58" y="20" width="6" height="15" rx="3" fill="#fbbf24" opacity=".82"/>
        <rect x="72" y="10" width="6" height="34" rx="3" fill="#fbbf24" opacity=".82"/>
        <rect x="86" y="16" width="6" height="23" rx="3" fill="#fbbf24" opacity=".82"/>
        <rect x="100" y="7" width="6" height="40" rx="3" fill="#fbbf24" opacity=".82"/>
        <rect x="114" y="19" width="6" height="17" rx="3" fill="#fbbf24" opacity=".82"/>
        <rect x="128" y="13" width="6" height="29" rx="3" fill="#fbbf24" opacity=".82"/>
        <text class="tiny mono soft" x="166" y="34">2.4s</text>
      </g>

      <g transform="translate(74 548)">
        <rect width="243" height="48" rx="24" fill="rgba(245,158,11,.1)" stroke="rgba(245,158,11,.2)" stroke-width="2"/>
        <text class="hotkey amber" x="25" y="32">Cmd Shift Space</text>
      </g>
      <text class="small muted" x="74" y="632">Dictation pill + mode roller, no main window needed</text>
    </g>

    <g transform="translate(1028 342)" filter="url(#panelShadow)">
      <rect width="548" height="424" rx="40" fill="rgba(28,27,24,.94)" stroke="rgba(255,255,255,.09)" stroke-width="2"/>
      <line x1="0" y1="156" x2="548" y2="156" stroke="rgba(255,255,255,.065)" stroke-width="2"/>
      <line x1="0" y1="310" x2="548" y2="310" stroke="rgba(255,255,255,.045)" stroke-width="2"/>
      <text class="label soft" x="34" y="56">NOTEBOOK</text>
      <text class="small soft" x="216" y="97">Quick Note · 8</text>
      <text class="small amber" x="198" y="136" font-weight="800">Product Ideas · 3</text>
      <text class="small soft" x="196" y="180">Language Practice · 5</text>

      <rect x="36" y="217" width="6" height="19" rx="3" fill="#f59e0b" opacity=".75"/>
      <rect x="52" y="199" width="6" height="45" rx="3" fill="#f59e0b" opacity=".75"/>
      <rect x="68" y="210" width="6" height="28" rx="3" fill="#f59e0b" opacity=".75"/>
      <rect x="84" y="193" width="6" height="56" rx="3" fill="#f59e0b" opacity=".75"/>
      <rect x="100" y="214" width="6" height="21" rx="3" fill="#f59e0b" opacity=".75"/>
      <circle cx="43" cy="274" r="8" fill="#ef4444"/>
      <text class="small soft" x="66" y="282">Listening</text>
      <text class="tiny mono soft" x="176" y="282">1.8s</text>

      <rect x="34" y="328" width="480" height="64" rx="18" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.055)" stroke-width="2"/>
      <text class="tiny muted" x="58" y="355">Capture ideas directly into a notebook, then export</text>
      <text class="tiny muted" x="58" y="381">them later as Markdown or JSON.</text>

      <rect x="32" y="450" width="218" height="52" rx="26" fill="rgba(245,158,11,.09)" stroke="rgba(245,158,11,.18)" stroke-width="2"/>
      <text class="hotkey amber" x="58" y="484">Option N notes</text>
    </g>

    <g transform="translate(1560 184)" filter="url(#panelShadow)">
      <rect width="690" height="540" rx="40" fill="rgba(28,27,24,.94)" stroke="rgba(255,255,255,.09)" stroke-width="2"/>
      <line x1="0" y1="68" x2="690" y2="68" stroke="rgba(255,255,255,.05)" stroke-width="2"/>
      <text class="panelTitle soft" x="35" y="43">Agent</text>
      <text class="tiny soft" x="590" y="43">Clear</text>

      <rect x="236" y="110" width="392" height="106" rx="28" fill="rgba(245,158,11,.13)" stroke="rgba(245,158,11,.12)" stroke-width="2"/>
      <text class="bubble white" x="268" y="151">Summarize selected text and</text>
      <text class="bubble white" x="268" y="185">open the notes panel.</text>

      <rect x="36" y="252" width="618" height="58" rx="18" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.055)" stroke-width="2"/>
      <circle cx="70" cy="281" r="8" fill="#86efac"/>
      <text class="small soft" x="96" y="289">selection.read</text>
      <text class="tiny mono soft" x="568" y="289">42ms</text>

      <rect x="36" y="328" width="618" height="58" rx="18" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.055)" stroke-width="2"/>
      <circle cx="70" cy="357" r="8" fill="#86efac"/>
      <text class="small soft" x="96" y="365">app.open Notes</text>
      <text class="tiny mono soft" x="568" y="365">88ms</text>

      <rect x="36" y="420" width="470" height="78" rx="26" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.065)" stroke-width="2"/>
      <text class="bubble muted" x="68" y="452">Done. I summarized it and opened</text>
      <text class="bubble muted" x="68" y="484">Notes so you can save it.</text>

      <circle cx="345" cy="535" r="31" fill="#f59e0b"/>
      <circle cx="345" cy="535" r="31" fill="#d97706" opacity=".45"/>
      <rect x="172" y="576" width="266" height="52" rx="26" fill="rgba(245,158,11,.09)" stroke="rgba(245,158,11,.18)" stroke-width="2"/>
      <text class="hotkey amber" x="200" y="610">Cmd Shift A agent</text>
    </g>

    <g transform="translate(1042 886)" filter="url(#softShadow)">
      <rect width="888" height="244" rx="42" fill="rgba(255,255,255,.035)" stroke="rgba(255,255,255,.07)" stroke-width="2"/>
      <text class="label soft" x="42" y="60">CURRENT APP</text>
      <rect x="42" y="88" width="804" height="92" rx="22" fill="rgba(255,255,255,.035)" stroke="rgba(255,255,255,.055)" stroke-width="2"/>
      <text class="body white" x="72" y="128">Fonos is an open-source voice terminal for Mac.</text>
      <text class="body muted" x="72" y="164">It turns speech into clean text anywhere.</text>
      <rect x="42" y="198" width="342" height="44" rx="22" fill="rgba(245,158,11,.09)" stroke="rgba(245,158,11,.18)" stroke-width="2"/>
      <text class="hotkey amber" x="64" y="227">Text appears at your cursor</text>
    </g>

    <g transform="translate(1900 906)" filter="url(#softShadow)">
      <rect width="382" height="118" rx="34" fill="rgba(26,25,23,.95)" stroke="rgba(251,191,36,.16)" stroke-width="2"/>
      <circle cx="48" cy="59" r="10" fill="#ef4444"/>
      <text class="small soft" x="78" y="67">Meeting capture</text>
      <text class="tiny mono soft" x="271" y="67">12:08</text>
      <rect x="42" y="136" width="282" height="52" rx="26" fill="rgba(245,158,11,.09)" stroke="rgba(245,158,11,.18)" stroke-width="2"/>
      <text class="hotkey amber" x="66" y="170">Cmd Shift M meeting</text>
    </g>

    <g transform="translate(130 1264)">
      <text class="body muted">Built for the moment your hands are busy but your thought is ready.</text>
      <text class="body muted" x="0" y="46">Shortcut in. Speak. Route the result. Keep working.</text>
    </g>
  </g>
</svg>
