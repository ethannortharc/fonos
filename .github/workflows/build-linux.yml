name: Build Linux Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Single owner of "does the release exist yet" — GH's release API has no
  # atomic create-if-missing, so having exactly one job run the
  # view-then-create sequence (instead of every matrix leg racing it) is what
  # eliminates the race where two legs reach "Upload to release" near
  # simultaneously, both see the tag missing, and the loser's `gh release
  # create` fails the job. `build-linux` (below) depends on this job and
  # waits for it, so by the time any matrix leg uploads, the release is
  # guaranteed to already exist.
  prepare-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Create release if it doesn't exist yet
        run: |
          # Shared with release-macos.sh's --publish preflight (either producer may
          # run first, and the two can race) — see the script's header for the
          # draft/race rationale.
          ./scripts/ensure-release-exists.sh "$TAG_NAME"

  build-linux:
    needs: prepare-release
    # This workflow also runs via workflow_dispatch on non-tag refs, where
    # prepare-release's own `if` skips it entirely. A job's default `if` is
    # implicitly `success()`, and GitHub Actions' `success()` treats a
    # *skipped* needed job the same as a *failed* one — both cause dependents
    # to be skipped. So without the explicit `|| result == 'skipped'` branch
    # below, this job would never run on workflow_dispatch (prepare-release
    # always skips there). Only a real prepare-release failure (or
    # cancellation) should block this job.
    if: ${{ !cancelled() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: amd64
          - runner: ubuntu-22.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libasound2-dev \
            rpm \
            xdg-utils \
            libfuse2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend dependencies
        working-directory: fonos-desktop
        run: npm ci

      - name: Create placeholder resources (macOS-only binaries)
        run: |
          # macOS Swift helpers — not needed on Linux, just need to exist for bundler
          touch fonos-desktop/src-tauri/resources/fonos-audio-capture
          touch fonos-desktop/src-tauri/resources/fonos-stt-apple
          touch fonos-desktop/src-tauri/resources/fonos-diarize
          python3 -c "
          import struct, zlib, os
          def make_png(w, h):
              raw = b''
              for y in range(h):
                  raw += b'\x00'
                  for x in range(w):
                      raw += b'\xf5\x9e\x0b\xff'
              c = zlib.compress(raw)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)
              def chunk(t, d):
                  return struct.pack('>I', len(d)) + t + d + struct.pack('>I', zlib.crc32(t + d) & 0xffffffff)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', c) + chunk(b'IEND', b'')
          d = 'fonos-desktop/src-tauri/resources'
          for name, size in [('tray_icon', 32), ('tray_icon_light', 32), ('icon_32x32', 32), ('icon_128x128', 128), ('icon_256x256', 256), ('icon_512x512', 512), ('icon_1024x1024', 1024)]:
              p = os.path.join(d, name + '.png')
              if not os.path.exists(p) or os.path.getsize(p) == 0:
                  open(p, 'wb').write(make_png(size, size))
                  print(f'Generated {p} ({size}x{size})')
          "

      # AppImage is the only Linux bundle format the updater can install in
      # place (see tauri.linux.conf.json), so it needs the same minisign
      # signing key used for the macOS updater artifacts (scripts/release-macos.sh).
      # deb/rpm don't get signed — they're not updater targets.
      - name: Build Tauri app (deb + rpm + appimage)
        working-directory: fonos-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --bundles deb,rpm,appimage

      - name: List build artifacts
        run: |
          echo "=== DEB ==="
          find target/release/bundle/deb -name "*.deb" -exec ls -lh {} \;
          echo "=== RPM ==="
          find target/release/bundle/rpm -name "*.rpm" -exec ls -lh {} \;
          echo "=== AppImage ==="
          find target/release/bundle/appimage -name "*.AppImage*" -exec ls -lh {} \;

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: fonos-deb-${{ matrix.arch }}
          path: target/release/bundle/deb/*.deb

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: fonos-rpm-${{ matrix.arch }}
          path: target/release/bundle/rpm/*.rpm

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: fonos-appimage-${{ matrix.arch }}
          path: target/release/bundle/appimage/*.AppImage

      # Kept separate from the .AppImage artifact above so the latest.json
      # merge job (below) can fetch just the tiny signature file per arch
      # without pulling down the multi-hundred-MB image.
      - name: Upload AppImage signature
        uses: actions/upload-artifact@v4
        with:
          name: fonos-appimage-sig-${{ matrix.arch }}
          path: target/release/bundle/appimage/*.AppImage.sig

      - name: Upload to release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # The release itself is created exactly once, by the prepare-release
          # job this job `needs:` — see that job's comment. By the time either
          # matrix leg reaches this step, the release is guaranteed to exist,
          # so this step only ever uploads assets (`--clobber` handles both
          # legs writing their own arch-suffixed files with no overlap, and a
          # re-run of this job overwriting its own prior attempt).
          for f in target/release/bundle/deb/*.deb target/release/bundle/rpm/*.rpm target/release/bundle/appimage/*.AppImage target/release/bundle/appimage/*.AppImage.sig; do
            gh release upload "$TAG_NAME" "$f" --clobber
          done

  # Runs once both matrix legs have uploaded their signed AppImage + .sig to
  # the release. Merges linux-x86_64/linux-aarch64 entries into latest.json
  # (creating it if release-macos.sh hasn't run yet for this tag, merging
  # into it if it has — see scripts/merge-latest-json.sh).
  publish-latest-json:
    needs: build-linux
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 updater signature
        uses: actions/download-artifact@v4
        with:
          name: fonos-appimage-sig-amd64
          path: sigs/amd64

      - name: Download arm64 updater signature
        uses: actions/download-artifact@v4
        with:
          name: fonos-appimage-sig-arm64
          path: sigs/arm64

      - name: Merge linux entries into latest.json
        run: |
          set -euo pipefail
          # Platform keys per the updater's static-JSON schema:
          # https://v2.tauri.app/plugin/updater/#static-json-file
          declare -A ARCH_TO_PLATFORM=( [amd64]=linux-x86_64 [arm64]=linux-aarch64 )
          fragment="$(mktemp)"
          echo '{}' > "$fragment"
          for arch in amd64 arm64; do
            sig_path="$(find "sigs/$arch" -name '*.AppImage.sig' | head -1)"
            if [[ -z "$sig_path" ]]; then
              echo "error: no .AppImage.sig found for $arch under sigs/$arch" >&2
              exit 1
            fi
            # The .sig filename (minus the .sig suffix) is exactly the asset
            # name we uploaded to the release, so the download URL follows
            # without having to guess Tauri's AppImage naming convention.
            appimage_name="$(basename "${sig_path%.sig}")"
            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${appimage_name}"
            signature="$(cat "$sig_path")"
            platform="${ARCH_TO_PLATFORM[$arch]}"
            jq --arg platform "$platform" --arg url "$url" --arg sig "$signature" \
              '. + {($platform): {url: $url, signature: $sig}}' "$fragment" > "$fragment.tmp"
            mv "$fragment.tmp" "$fragment"
          done
          ./scripts/merge-latest-json.sh "$TAG_NAME" "$fragment" latest.json --upload
