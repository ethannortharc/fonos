<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: transparent; overflow: hidden; width:100%; height:100%;
    -webkit-user-select:none; user-select:none; }
  #stage { position:relative; width:220px; height:230px; cursor: default; }

  /* ── the panda (SVG groups toggled by state) ── */
  #panda { position:absolute; left:10px; bottom:18px; width:200px; height:200px; }

  /* breathing while sitting */
  #sit { transform-origin: 100px 150px; animation: breathe 3.2s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{ transform: scale(1,1);} 50%{ transform: scale(1.015,0.985);} }

  /* blink: eyelids scale down over eyes */
  .lid { transform-origin: center; transform: scaleY(0); }
  .blink .lid { animation: blinkA 0.22s ease-in-out; }
  @keyframes blinkA { 0%,100%{ transform: scaleY(0);} 50%{ transform: scaleY(1);} }

  /* wave: right arm rotates */
  #arm-r { transform-origin: 142px 124px; }
  .wave #arm-r { animation: waveA 0.5s ease-in-out 2; }
  @keyframes waveA { 0%,100%{ transform: rotate(0);} 50%{ transform: rotate(-70deg);} }
  .wave #head-g { animation: tiltA 1s ease-in-out 1; transform-origin: 100px 90px; }
  @keyframes tiltA { 0%,100%{ transform: rotate(0);} 50%{ transform: rotate(8deg);} }

  /* nibble: bamboo shoot to mouth, jaw chews */
  #shoot { transform-origin: 92px 160px; }
  .nibble #shoot { animation: shootUp 2.8s ease-in-out 1; }
  @keyframes shootUp { 0%,100%{ transform: none;} 20%,80%{ transform: translate(4px,-14px) rotate(14deg);} }
  .nibble #mouth { animation: chew 0.35s ease-in-out 5 0.6s; transform-origin: 100px 104px; }
  @keyframes chew { 0%,100%{ transform: scaleY(1);} 50%{ transform: scaleY(1.9);} }

  /* happy hearts on click */
  .heart { position:absolute; font-size:16px; pointer-events:none; animation: floatUp 1.2s ease-out forwards; }
  @keyframes floatUp { 0%{ opacity:0; transform: translateY(0) scale(0.6);} 20%{opacity:1;}
    100%{ opacity:0; transform: translateY(-46px) scale(1.15);} }

  /* ── ball (rolling) form ── */
  #ball { transform-origin: 100px 140px; }
  .squash { animation: squashA 0.22s ease-in-out; transform-origin: 100px 178px; }
  @keyframes squashA { 0%,100%{ transform: scale(1,1);} 50%{ transform: scale(1.12,0.82);} }

  /* bamboo pole the panda travels on */
  #pole { position:absolute; left:0; bottom:2px; width:220px; height:18px; }

  .hidden { display:none; }
</style>
</head>
<body>
<div id="stage">
  <!-- bamboo pole -->
  <svg id="pole" viewBox="0 0 220 18">
    <rect x="0" y="5" width="220" height="9" rx="4.5" fill="#57a05a"/>
    <rect x="0" y="5" width="220" height="4" rx="2" fill="#6db870" opacity="0.8"/>
    <g fill="#3d7a40">
      <rect x="36" y="4" width="3.5" height="11" rx="1.6"/>
      <rect x="106" y="4" width="3.5" height="11" rx="1.6"/>
      <rect x="176" y="4" width="3.5" height="11" rx="1.6"/>
    </g>
  </svg>

  <svg id="panda" viewBox="0 0 200 200">
    <!-- ═══ sitting form ═══ -->
    <g id="sit">
      <!-- legs -->
      <ellipse cx="72" cy="180" rx="16" ry="11" fill="#2b2b2b"/>
      <ellipse cx="128" cy="180" rx="16" ry="11" fill="#2b2b2b"/>
      <ellipse cx="70" cy="178" rx="6.5" ry="4" fill="#4a4a4a"/>
      <ellipse cx="130" cy="178" rx="6.5" ry="4" fill="#4a4a4a"/>
      <!-- body -->
      <ellipse cx="100" cy="142" rx="54" ry="44" fill="#ffffff"/>
      <ellipse cx="100" cy="152" rx="36" ry="28" fill="#f6f1ea"/>
      <!-- bamboo shoot hugged in front -->
      <g id="shoot">
        <rect x="88" y="116" width="7" height="48" rx="3.5" fill="#57a05a"/>
        <rect x="88" y="132" width="7" height="2.5" fill="#3d7a40"/>
        <rect x="88" y="148" width="7" height="2.5" fill="#3d7a40"/>
        <path d="M 94 124 q 16 -8 30 0 q -14 10 -30 4 z" fill="#6db870"/>
        <path d="M 90 130 q -16 -8 -28 -2 q 12 10 28 6 z" fill="#57a05a"/>
      </g>
      <!-- arms: shoulder → paw gripping the stalk (drawn over the shoot) -->
      <path id="arm-l" d="M 56 122 Q 58 148 84 150 Q 94 150 92 141 Q 88 132 70 126 Q 60 120 56 122 Z" fill="#2b2b2b"/>
      <path id="arm-r" d="M 144 122 Q 142 148 108 150 Q 99 150 101 141 Q 106 132 130 126 Q 140 120 144 122 Z" fill="#2b2b2b"/>
      <circle cx="88" cy="145" r="7.5" fill="#2b2b2b"/>
      <circle cx="103" cy="145" r="7.5" fill="#2b2b2b"/>
      <!-- head -->
      <g id="head-g">
        <circle cx="64" cy="38" r="17" fill="#2b2b2b"/>
        <circle cx="136" cy="38" r="17" fill="#2b2b2b"/>
        <circle cx="64" cy="40" r="9" fill="#4a4a4a"/>
        <circle cx="136" cy="40" r="9" fill="#4a4a4a"/>
        <circle cx="100" cy="78" r="50" fill="#ffffff"/>
        <!-- eye patches -->
        <ellipse cx="78" cy="76" rx="14" ry="18" fill="#2b2b2b" transform="rotate(-14 78 76)"/>
        <ellipse cx="122" cy="76" rx="14" ry="18" fill="#2b2b2b" transform="rotate(14 122 76)"/>
        <!-- eyes -->
        <circle cx="80" cy="74" r="6.5" fill="#ffffff"/>
        <circle cx="120" cy="74" r="6.5" fill="#ffffff"/>
        <circle cx="81" cy="75" r="3.6" fill="#1a1a1a"/>
        <circle cx="119" cy="75" r="3.6" fill="#1a1a1a"/>
        <circle cx="82.5" cy="73.5" r="1.4" fill="#ffffff"/>
        <circle cx="120.5" cy="73.5" r="1.4" fill="#ffffff"/>
        <!-- eyelids for blink -->
        <ellipse class="lid" cx="80" cy="74" rx="7.5" ry="7.5" fill="#2b2b2b"/>
        <ellipse class="lid" cx="120" cy="74" rx="7.5" ry="7.5" fill="#2b2b2b"/>
        <!-- blush -->
        <circle cx="63" cy="94" r="6" fill="#f6b8c1" opacity="0.75"/>
        <circle cx="137" cy="94" r="6" fill="#f6b8c1" opacity="0.75"/>
        <!-- nose + mouth -->
        <ellipse cx="100" cy="93" rx="6.5" ry="5" fill="#2b2b2b"/>
        <path id="mouth" d="M 100 98 q -1 6 -7 7 M 100 98 q 1 6 7 7" stroke="#2b2b2b"
              stroke-width="2.4" fill="none" stroke-linecap="round"/>
      </g>
    </g>

    <!-- ═══ ball form (rolling) ═══ -->
    <g id="ball" class="hidden">
      <circle cx="100" cy="140" r="58" fill="#ffffff"/>
      <circle cx="100" cy="140" r="58" fill="none" stroke="#eee7de" stroke-width="3"/>
      <!-- tucked ears -->
      <circle cx="66" cy="102" r="15" fill="#2b2b2b"/>
      <circle cx="134" cy="102" r="15" fill="#2b2b2b"/>
      <!-- tucked limbs as side patches -->
      <ellipse cx="56" cy="160" rx="16" ry="20" fill="#2b2b2b" transform="rotate(30 56 160)"/>
      <ellipse cx="144" cy="160" rx="16" ry="20" fill="#2b2b2b" transform="rotate(-30 144 160)"/>
      <!-- happy closed eyes on patches -->
      <ellipse cx="80" cy="128" rx="12" ry="15" fill="#2b2b2b" transform="rotate(-12 80 128)"/>
      <ellipse cx="120" cy="128" rx="12" ry="15" fill="#2b2b2b" transform="rotate(12 120 128)"/>
      <path d="M 74 126 q 5 -5 10 0" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path d="M 116 126 q 5 -5 10 0" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <ellipse cx="100" cy="146" rx="5.5" ry="4.5" fill="#2b2b2b"/>
      <path d="M 100 151 q -1 5 -6 6 M 100 151 q 1 5 6 6" stroke="#2b2b2b" stroke-width="2.2"
            fill="none" stroke-linecap="round"/>
    </g>
  </svg>
</div>

<script>
const stage = document.getElementById('stage');
const panda = document.getElementById('panda');
const sit = document.getElementById('sit');
const ball = document.getElementById('ball');

let rolling = false;
let rollRAF = null;
let angle = 0;

// ── state machine driven by the native shell ──────────────────────────────
// setState('roll', dirPxPerSec)  — curl into a ball and spin like a wheel
// setState('sit')                — unfurl, resume idle life
// doNibble() / doWave()          — one-shot idle actions
function setState(s, pxPerSec) {
  if (s === 'roll') {
    if (!rolling) {
      rolling = true;
      panda.classList.add('squash');
      setTimeout(() => {
        panda.classList.remove('squash');
        sit.classList.add('hidden');
        ball.classList.remove('hidden');
      }, 110);
    }
    startSpin(pxPerSec || 0);
  } else {
    rolling = false;
    if (rollRAF) { cancelAnimationFrame(rollRAF); rollRAF = null; }
    ball.style.transform = '';
    angle = 0;
    panda.classList.add('squash');
    setTimeout(() => {
      panda.classList.remove('squash');
      ball.classList.add('hidden');
      sit.classList.remove('hidden');
    }, 110);
  }
}

// wheel-accurate spin: deg/sec = v / (π·d) · 360, ball diameter ≈ 116px
function startSpin(pxPerSec) {
  const degPerMs = (pxPerSec / (Math.PI * 116)) * 360 / 1000;
  let last = performance.now();
  if (rollRAF) cancelAnimationFrame(rollRAF);
  const tick = (now) => {
    if (!rolling) return;
    angle += degPerMs * (now - last);
    last = now;
    ball.style.transform = `rotate(${angle}deg)`;
    rollRAF = requestAnimationFrame(tick);
  };
  rollRAF = requestAnimationFrame(tick);
}

function doNibble() {
  if (rolling) return;
  panda.classList.add('nibble');
  setTimeout(() => panda.classList.remove('nibble'), 3000);
}

function doWave() {
  if (rolling) return;
  panda.classList.add('wave');
  setTimeout(() => panda.classList.remove('wave'), 1100);
}

// ── autonomous idle life ───────────────────────────────────────────────────
function blink() {
  if (!rolling) {
    panda.classList.add('blink');
    setTimeout(() => panda.classList.remove('blink'), 260);
  }
  setTimeout(blink, 2200 + Math.random() * 3200);
}
setTimeout(blink, 1500);

// ── interaction: click = wave + hearts, right-click = quit ────────────────
stage.addEventListener('click', () => {
  doWave();
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = ['💚','🎋','✨'][Math.floor(Math.random() * 3)];
  h.style.left = (70 + Math.random() * 70) + 'px';
  h.style.top = '46px';
  stage.appendChild(h);
  setTimeout(() => h.remove(), 1300);
});
stage.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  window.webkit?.messageHandlers?.quit?.postMessage('bye');
});
</script>
</body>
</html>
