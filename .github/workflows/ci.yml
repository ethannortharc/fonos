name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fonos-desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: fonos-desktop
        run: npm ci

      - name: Test (vitest)
        working-directory: fonos-desktop
        run: npm test

      - name: Build (tsc -b && vite build)
        working-directory: fonos-desktop
        run: npm run build

  rust:
    # macOS runner doubles as the macOS smoke build (Tauri macOS deps ship
    # with Xcode CLT, so no extra system deps are needed here — unlike
    # build-linux.yml's apt-get step for the Linux webkit/gtk stack).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # fonos-diarize is a gitignored SwiftPM build product, but tauri.conf.json
      # lists it as a resource and tauri-build hard-errors on missing resources.
      # Same placeholder trick build-linux.yml uses; runtime degrades gracefully
      # when the helper is missing, and no test executes it.
      - name: Stub gitignored diarize sidecar
        run: touch fonos-desktop/src-tauri/resources/fonos-diarize

      # NOTE: `cargo fmt --all --check` is intentionally not run here.
      # Verified locally (2026-07-14) against a clean workspace: it fails
      # across ~96 files / 1365 diff hunks repo-wide (pre-existing drift,
      # not something this workflow should gate on). Revisit once the
      # codebase has been reformatted in a dedicated pass.
      - name: Clippy
        run: cargo clippy --workspace

      # `ci` feature (fonos-desktop/src-tauri/Cargo.toml) skips hardware-
      # dependent tests (mic, accessibility) that can't run on a CI runner.
      - name: Test
        run: cargo test --workspace --features ci

      - name: Build (smoke)
        run: cargo build --workspace
