<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* clip-path masks the webview background bleed at the rounded corners
   (same trick as agent-panel.html / text-action-panel.html). */
html,body{height:100%;margin:0}
html{background:transparent;overflow:hidden;-webkit-user-select:none;user-select:none;
  -webkit-clip-path:inset(0 round 16px);clip-path:inset(0 round 16px)}
body{background:transparent;overflow:hidden}

@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes dropIn{from{opacity:0;transform:translateY(-10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes msgIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:0}

#root{display:flex;flex-direction:column;height:100vh;overflow:hidden;
  background:rgba(28,27,24,0.92);
  -webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-radius:16px;border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  animation:dropIn .18s cubic-bezier(.23,1,.32,1);
  font-family:-apple-system,system-ui,sans-serif}

#hdr{display:flex;padding:8px 12px 6px;border-bottom:1px solid rgba(255,255,255,.04);
  align-items:center;justify-content:space-between;flex-shrink:0}
#hT{font-size:11px;color:rgba(255,255,255,.4);font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#hX{font-size:11px;color:rgba(255,255,255,.15);background:0;border:0;cursor:pointer;
  padding:2px 4px;font-family:inherit;flex-shrink:0;margin-left:8px}
#hX:hover{color:rgba(255,255,255,.4)}

#log{flex:1;overflow-y:auto;padding:12px;min-height:0;
  display:flex;flex-direction:column;gap:6px}

.ru{display:flex;justify-content:flex-end}
.ra{display:flex;justify-content:flex-start}
.bu{max-width:82%;border-radius:14px 14px 4px 14px;padding:7px 12px;font-size:11.5px;
  line-height:1.5;color:#fafaf9;background:rgba(245,158,11,.12);
  border:1px solid rgba(245,158,11,.08);animation:msgIn .14s ease-out;
  white-space:pre-wrap;word-break:break-word;-webkit-user-select:text;user-select:text}
.ba{max-width:84%;border-radius:14px 14px 14px 4px;padding:7px 12px;font-size:11.5px;
  line-height:1.5;color:rgba(255,255,255,.82);background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.05);animation:msgIn .14s ease-out;
  white-space:pre-wrap;word-break:break-word;-webkit-user-select:text;user-select:text}
.be{max-width:84%;border-radius:14px 14px 14px 4px;padding:7px 12px;font-size:11px;
  color:rgba(239,68,68,.8);background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.08);
  white-space:pre-wrap;word-break:break-word}
.ba code,.bu code{font-family:'SF Mono',ui-monospace,monospace;font-size:10.5px;
  background:rgba(255,255,255,.08);border-radius:4px;padding:1px 4px}
.ba pre,.bu pre{background:rgba(255,255,255,.06);border-radius:6px;padding:6px 8px;
  margin:3px 0;overflow-x:auto;white-space:pre}
.ba pre code,.bu pre code{background:none;padding:0;display:block}
.ba strong,.bu strong{font-weight:600;color:#fff}
.ba em,.bu em{font-style:italic}
.ba .mdH,.bu .mdH{display:block;margin:4px 0 2px;font-size:12.5px}
.ba ul,.bu ul{margin:2px 0 2px 16px}
.ba ol,.bu ol{margin:2px 0 2px 16px}
.ba li,.bu li{margin:1px 0}

.tw{display:flex;justify-content:flex-start}
.tb{border-radius:14px 14px 14px 4px;padding:8px 14px;display:inline-flex;gap:5px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05)}
.td{width:4px;height:4px;border-radius:50%;background:#fbbf24;animation:pulse 1.2s ease-in-out infinite}

#composer{display:flex;gap:6px;align-items:flex-end;padding:8px;flex-shrink:0;
  border-top:1px solid rgba(255,255,255,.04)}
#ta{flex:1;resize:none;font-family:inherit;font-size:11.5px;line-height:1.4;
  color:#fafaf9;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:7px 10px;max-height:88px;min-height:34px;outline:none;
  -webkit-user-select:text;user-select:text}
#ta::placeholder{color:rgba(255,255,255,.22)}
#ta:focus{border-color:rgba(245,158,11,.25);background:rgba(255,255,255,.06)}
#send{flex-shrink:0;font-size:11px;font-weight:500;padding:8px 14px;border-radius:10px;
  cursor:pointer;font-family:inherit;color:#fbbf24;background:rgba(245,158,11,.1);
  border:1px solid rgba(245,158,11,.14);transition:all .1s}
#send:hover{background:rgba(245,158,11,.18)}
#send:disabled{opacity:.3;cursor:default}
</style>
</head>
<body>
<div id="root">
  <div id="hdr"><span id="hT">Dialog</span><button id="hX" onclick="hide()">&#10005;</button></div>
  <div id="log"></div>
  <div id="composer">
    <textarea id="ta" rows="1" placeholder="Reply…"></textarea>
    <button id="send" onclick="send()">Send</button>
  </div>
</div>
<script>
var MD=false, thinking=null;
var log=document.getElementById('log'), ta=document.getElementById('ta'),
    hT=document.getElementById('hT');

function $t(){return typeof window.__TAURI_INTERNALS__!=='undefined'?window.__TAURI_INTERNALS__:null}
function iv(c,a){var t=$t();return t?t.invoke(c,a||{}):Promise.reject(new Error('no tauri'))}
function hide(){iv('hide_dialog_panel').catch(function(e){console.error(e)})}

/* ── Minimal, injection-safe markdown (escape first, then a tiny subset) ──── */
/* Pass order: escape -> fenced code (placeholdered) -> inline code -> bold ->
   italic -> links -> line pass (headings/ol/ul) -> restore fenced code. */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function md(t){
  var e=esc(t);
  var fb=[]; // fenced code blocks, restored after line pass so their content
             // is never mistaken for list/heading markup
  var M1=String.fromCharCode(1), M2=String.fromCharCode(2); // ASCII placeholder delimiters (unlikely in prose)
  e=e.replace(/```([^\n`]*)\n([\s\S]*?)```/g,function(_,lang,code){
    fb.push('<pre><code>'+code.replace(/\n$/,'')+'</code></pre>');
    return M1+(fb.length-1)+M2;
  });
  e=e.replace(/`([^`]+)`/g,'<code>$1</code>');
  e=e.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  e=e.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  e=e.replace(/\[([^\]]+)\]\([^)]*\)/g,'<em>$1</em>'); // no nav in these panels: text only
  var lines=e.split('\n'), out=[], inUl=false, inOl=false;
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    var h=line.match(/^#{1,3}\s+(.*)$/);
    var o=!h&&line.match(/^\s*\d+[.)]\s+(.*)$/);
    var u=!h&&!o&&line.match(/^\s*[-*]\s+(.*)$/);
    if(o){ if(inUl){out.push('</ul>');inUl=false;} if(!inOl){out.push('<ol>');inOl=true;} out.push('<li>'+o[1]+'</li>'); }
    else if(u){ if(inOl){out.push('</ol>');inOl=false;} if(!inUl){out.push('<ul>');inUl=true;} out.push('<li>'+u[1]+'</li>'); }
    else {
      if(inUl){out.push('</ul>');inUl=false;}
      if(inOl){out.push('</ol>');inOl=false;}
      out.push(h?'<div class="mdH"><strong>'+h[1]+'</strong></div>':line);
    }
  }
  if(inUl)out.push('</ul>');
  if(inOl)out.push('</ol>');
  e=out.join('\n');
  e=e.replace(new RegExp(M1+'(\\d+)'+M2,'g'),function(_,idx){return fb[idx];});
  return e;
}

/* ── Bubbles ──────────────────────────────────────────────────────────────── */
function bubble(role,text){
  clearThinking();
  var row=document.createElement('div');
  var b=document.createElement('div');
  if(role==='user'){ row.className='ru'; b.className='bu'; b.textContent=text; }
  else if(role==='error'){ row.className='ra'; b.className='be'; b.textContent=text; }
  else { row.className='ra'; b.className='ba';
    if(MD) b.innerHTML=md(text); else b.textContent=text; }
  row.appendChild(b); log.appendChild(row);
  log.scrollTop=log.scrollHeight;
}
function showThinking(){
  if(thinking)return;
  var row=document.createElement('div'); row.className='tw';
  var b=document.createElement('div'); b.className='tb';
  [0,150,300].forEach(function(d){var o=document.createElement('div');o.className='td';
    o.style.animationDelay=d+'ms';b.appendChild(o)});
  row.appendChild(b); log.appendChild(row); thinking=row;
  log.scrollTop=log.scrollHeight;
}
function clearThinking(){ if(thinking){thinking.remove();thinking=null} }

/* ── Entry points called from Rust via window.eval() ──────────────────────── */
function recvInit(title,firstUser,firstAssistant,markdown){
  MD=!!markdown;
  hT.textContent=title||'Dialog';
  log.innerHTML=''; thinking=null;
  if(firstUser) bubble('user',firstUser);
  if(firstAssistant) bubble('assistant',firstAssistant);
  ta.focus();
}
function recvTurn(role,text){ bubble(role,text); }
function recvThinking(){ showThinking(); }
function recvError(msg){ bubble('error',msg||'Error'); }

/* ── Composer ─────────────────────────────────────────────────────────────── */
function send(){
  var text=ta.value.trim();
  if(!text)return;
  ta.value=''; ta.style.height='';
  bubble('user',text);      // optimistic echo — Rust does not re-send the user turn
  showThinking();
  iv('dialog_send',{text:text}).catch(function(e){
    // Rust surfaces next_turn failures via recvError(); this catch only logs.
    clearThinking(); console.error(e);
  });
}

/* Auto-grow the textarea up to its max-height. */
ta.addEventListener('input',function(){ ta.style.height='auto';
  ta.style.height=Math.min(88,ta.scrollHeight)+'px'; });

/* Enter sends, Shift+Enter inserts a newline. */
ta.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }
});

/* Dismissal: Esc only. NOTE: no blur listener — a dialog stays open while the
   user switches to another app (differs from the text-action panel). */
window.addEventListener('keydown',function(e){ if(e.key==='Escape') hide(); });
</script>
</body>
</html>
