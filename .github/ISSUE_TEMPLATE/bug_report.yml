name: Bug report
description: Something isn't working the way it should.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux - X11
        - Linux - Wayland
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Fonos version
      description: Settings → General, or the version in the release you downloaded.
      placeholder: v0.8.0
    validations:
      required: true

  - type: textarea
    id: engines
    attributes:
      label: Engines in use
      description: >
        Which STT / LLM / TTS engines are configured, and whether each is
        local or cloud (e.g. "STT: Apple Speech (local), LLM: Claude
        (cloud), TTS: unconfigured").
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: >
        Relevant output (Fonos logs to stderr — run it from a terminal to
        capture this, e.g. `open -a Fonos` won't show it, but launching the
        binary directly will). Redact API keys.
      render: text
    validations:
      required: false
