<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* clip-path on html forces the four corners to be fully transparent —
   even if the webview background bleeds through, the clip masks it out. */
html{background:transparent;overflow:hidden;-webkit-user-select:none;user-select:none;
  -webkit-clip-path:inset(0 round 20px);clip-path:inset(0 round 20px)}
body{background:transparent;overflow:hidden}

@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes dropIn{from{opacity:0;transform:translateY(-14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes msgIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes bar{0%,100%{height:2px}50%{height:var(--h)}}

::-webkit-scrollbar{width:0}

#drop{
  width:100%;
  background:rgba(28,27,24,0.92);
  -webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  display:flex;flex-direction:column;overflow:hidden;
  animation:dropIn .22s cubic-bezier(.23,1,.32,1);
  font-family:-apple-system,system-ui,sans-serif;
}

#hdr{display:none;padding:8px 14px 6px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;justify-content:space-between;flex-shrink:0}
#hdr.on{display:flex}
.hL{font-size:11px;color:rgba(255,255,255,.3);font-weight:500;display:flex;align-items:center;gap:5px}
.hB{font-size:9px;color:rgba(255,255,255,.15);background:0;border:0;cursor:pointer;padding:2px 4px;font-family:inherit}
.hB:hover{color:rgba(255,255,255,.4)}

/* Provider capability notice (#69 mitigation): same amber "degraded, not
   broken" tone meeting-panel.html uses for its diarize-degradation notice —
   dismissible-not-required, so it's a thin strip rather than a blocking modal. */
#pn{display:none;align-items:center;gap:8px;padding:6px 14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.04)}
#pn.on{display:flex}
#pnt{flex:1;font-size:10px;line-height:1.4;color:rgba(245,158,11,.75)}
#pn .hB{color:rgba(245,158,11,.4)}
#pn .hB:hover{color:rgba(245,158,11,.7)}

#cv{overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;min-height:0;max-height:300px}

.ru{display:flex;justify-content:flex-end}
.ra{display:flex;justify-content:flex-start}
.bu{max-width:80%;border-radius:14px 14px 4px 14px;padding:7px 12px;font-size:11px;line-height:1.5;color:#fafaf9;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.08);animation:msgIn .14s ease-out;white-space:pre-wrap}
.ba{max-width:84%;border-radius:14px 14px 14px 4px;padding:7px 12px;font-size:11px;line-height:1.5;color:rgba(255,255,255,.7);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);animation:msgIn .14s ease-out;white-space:pre-wrap}
.be{max-width:84%;border-radius:14px 14px 14px 4px;padding:7px 12px;font-size:11px;color:rgba(239,68,68,.8);background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.08);white-space:pre-wrap}
.ba code{font-family:'SF Mono',ui-monospace,monospace;font-size:10px;background:rgba(255,255,255,.08);border-radius:4px;padding:1px 4px}
.ba pre{background:rgba(255,255,255,.06);border-radius:6px;padding:6px 8px;margin:3px 0;overflow-x:auto;white-space:pre}
.ba pre code{background:none;padding:0;display:block}
.ba strong{font-weight:600;color:#fff}
.ba em{font-style:italic}
.ba .mdH{display:block;margin:4px 0 2px;font-size:12px}
.ba ul{margin:2px 0 2px 16px}
.ba ol{margin:2px 0 2px 16px}
.ba li{margin:1px 0}
.ba .mdTblWrap{overflow-x:auto;max-width:100%;margin:3px 0;white-space:normal}
.ba table{border-collapse:collapse;width:auto;font-size:10px}
.ba th,.ba td{border:1px solid rgba(255,255,255,.08);padding:3px 8px;text-align:left;white-space:nowrap;word-break:normal}
.ba th{color:#fff;font-weight:500;background:rgba(255,255,255,.05)}
.bs{max-width:80%;border-radius:8px;padding:5px 10px;font-size:9px;line-height:1.4;color:rgba(255,255,255,.3);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);animation:msgIn .14s ease-out}
.bs .sl{font-size:7px;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px}
.bs .st{color:rgba(255,255,255,.35);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.rb{display:inline-flex;gap:4px;margin-top:4px}
.rb button{font-size:8px;padding:2px 8px;border-radius:6px;border:1px solid;cursor:pointer;font-family:inherit;transition:all .1s}
.rb .rp{color:#fbbf24;background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.12)}
.rb .rp:hover{background:rgba(245,158,11,.15)}
.rb .rc{color:rgba(255,255,255,.25);background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05)}
.rb .rc:hover{color:rgba(255,255,255,.5)}
.rd-ok{font-size:8px;color:rgba(134,239,172,.6);margin-top:3px}

.sk{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.035);animation:msgIn .14s ease-out}
.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sn{font-size:8px;color:rgba(255,255,255,.3);white-space:nowrap}
.sp{font-size:8px;color:rgba(255,255,255,.14);font-family:'SF Mono',ui-monospace,monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sl{font-size:7px;color:rgba(255,255,255,.1);font-family:'SF Mono',ui-monospace,monospace}

.tw{display:flex;justify-content:flex-start}
.tb{border-radius:14px 14px 14px 4px;padding:8px 14px;display:inline-flex;gap:5px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05)}
.td{width:4px;height:4px;border-radius:50%;background:#fbbf24;animation:pulse 1.2s ease-in-out infinite}

#rb{display:none;align-items:center;gap:8px;padding:14px 16px;flex-shrink:0}
#rb.on{display:flex}
#rd{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 1s ease-in-out infinite;flex-shrink:0}
#rl{font-size:11px;color:rgba(255,255,255,.35)}
#rt{font-size:10px;color:rgba(255,255,255,.18);font-family:'SF Mono',ui-monospace,monospace}
#wf{display:flex;align-items:flex-end;gap:2px;height:16px;margin-left:auto}
.wb{width:2.5px;border-radius:1.5px;background:#ef4444;animation:bar .55s ease-in-out infinite}

#mf{display:none;flex-shrink:0;border-top:1px solid rgba(255,255,255,.04);justify-content:center;padding:8px}
#mf.on{display:flex}
#mb{width:30px;height:30px;border-radius:50%;border:0;cursor:pointer;background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 0 12px rgba(245,158,11,.12);display:flex;align-items:center;justify-content:center;transition:all .12s}
#mb:hover{box-shadow:0 0 16px rgba(245,158,11,.2);transform:scale(1.06)}
#mb.act{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 0 8px rgba(239,68,68,.12)}

#es{padding:14px;text-align:center}
.el{font-size:10px;color:rgba(255,255,255,.18)}
#ch{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:8px}
.cp{font-size:8px;color:rgba(255,255,255,.25);background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:all .1s}
.cp:hover{color:rgba(255,255,255,.45);background:rgba(255,255,255,.06)}
</style>
</head>
<body>
<div id="drop">
  <div id="hdr"><span class="hL"><span style="font-size:11px">&#x2728;</span> Agent</span><div style="display:flex;gap:8px"><button class="hB" onclick="clearC()">Clear</button><button class="hB" style="font-size:10px" onclick="hide()">&#10005;</button></div></div>
  <div id="pn"><span id="pnt"></span><button class="hB" onclick="dismissPn()">&#10005;</button></div>
  <div id="cv">
    <div id="es"><div class="el">Ask anything</div><div id="ch"><button class="cp" onclick="chip(this)">What&#x27;s my IP?</button><button class="cp" onclick="chip(this)">Open Safari</button><button class="cp" onclick="chip(this)">System memory</button></div></div>
  </div>
  <div id="rb"><div id="rd"></div><span id="rl">Listening</span><span id="rt">0.0s</span><div id="wf"><div class="wb" style="--h:6px;animation-delay:0s"></div><div class="wb" style="--h:12px;animation-delay:.06s"></div><div class="wb" style="--h:8px;animation-delay:.03s"></div><div class="wb" style="--h:15px;animation-delay:.09s"></div><div class="wb" style="--h:7px;animation-delay:.05s"></div><div class="wb" style="--h:13px;animation-delay:.08s"></div><div class="wb" style="--h:5px;animation-delay:.12s"></div><div class="wb" style="--h:10px;animation-delay:.02s"></div><div class="wb" style="--h:4px;animation-delay:.14s"></div></div></div>
  <div id="mf"><button id="mb" onclick="mic()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="9" y="1" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button></div>
</div>
<script>
var M=[],P=false,ri=null,rs=0,ma=false,tk=null,pnDismissed=false;
var cv=document.getElementById('cv'),es=document.getElementById('es'),rb=document.getElementById('rb'),rt=document.getElementById('rt'),hd=document.getElementById('hdr'),mf=document.getElementById('mf'),mb=document.getElementById('mb'),pn=document.getElementById('pn'),pnt=document.getElementById('pnt');
function $t(){return typeof window.__TAURI_INTERNALS__!=='undefined'?window.__TAURI_INTERNALS__:null}
function iv(c,a){var t=$t();return t?t.invoke(c,a||{}).catch(function(e){console.error(c,e)}):Promise.resolve()}

/* ── Tiny inline i18n (meeting-panel.html pattern, trimmed to this task's
   one key) ── This standalone webview can't import the main app's
   lib/i18n (a React/TS module bundled with the main window only), so it
   owns a minimal STR dictionary covering just the #69 provider-capability
   notice — everything else in this panel stays hardcoded English (matches
   every other satellite panel; out of scope here). Locale follows
   config.ui_language, resolved at setup() and live-updated on the app-wide
   config:saved event (see setup()'s listener) so a language switch reaches
   the notice text without a panel restart. */
var STR={
  en:{ 'anthropic-no-tools':"Anthropic models can't run agent actions yet — replies are chat-only (#69)" },
  zh:{ 'anthropic-no-tools':'Anthropic 模型暂不支持执行操作 — 仅对话回复（#69）' }
};
var LOCALE='en';
function L(k){return (STR[LOCALE]&&STR[LOCALE][k])||STR.en[k]||k;}
function applyLocale(s){ LOCALE=(s==='en'||s==='zh')?s:((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en'); }

/* ── #69 mitigation: tell the user up front when ANY agent exchange this
   panel can drive would resolve to Anthropic, whose processor arm
   (fonos-core/src/agent/processor.rs) drops the tools array — the agent still
   chats but silently can't run skills. The backend weighs every resolution
   path (the typed/mic agent_process legacy chain AND every agent widget's own
   llm_widget ref) and returns 'anthropic' if any one hits — see
   commands::agent::agent_any_anthropic. Re-evaluated on every show()
   (persistent open AND each voice/text exchange) AND — for a panel left open
   across a live config edit — on the app-wide config:saved event (setup()'s
   listener), so swapping the model never leaves this notice stale. */
function checkProviderNotice(){
  iv('agent_llm_provider').then(function(p){
    if(p==='anthropic')showProviderNotice();else hideProviderNotice();
  }).catch(function(){});
}
function showProviderNotice(){
  if(pnDismissed)return;
  pnt.textContent=L('anthropic-no-tools');
  pn.classList.add('on');
  rz();
}
function hideProviderNotice(){pn.classList.remove('on');rz();}
function dismissPn(){pnDismissed=true;hideProviderNotice()}

/* ── Minimal, injection-safe markdown (escape first, then a tiny subset) ──── */
/* Copied verbatim from dialog-panel.html's renderer — these panels are
   self-contained HTML with no shared module. Pass order: escape -> fenced
   code (placeholdered) -> inline code -> bold -> italic -> links -> line
   pass (headings/ol/ul) -> restore fenced code. Applied to assistant
   response bubbles only; user/error bubbles stay plain-text (textContent). */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
/* GFM pipe-table helpers: split a row into trimmed cells (stripping optional
   outer pipes) and read an alignment colon pair from a separator cell. */
function tblCells(line){
  var s=line.trim();
  if(s.charAt(0)==='|') s=s.slice(1);
  if(s.length&&s.charAt(s.length-1)==='|') s=s.slice(0,-1);
  return s.split('|').map(function(c){return c.trim()});
}
function tblAlign(cell){
  var l=cell.charAt(0)===':', r=cell.length>0&&cell.charAt(cell.length-1)===':';
  if(l&&r)return 'center'; if(r)return 'right'; if(l)return 'left'; return '';
}
function md(t){
  var e=esc(t);
  var fb=[]; // fenced code blocks, restored after line pass so their content
             // is never mistaken for list/heading markup
  var M1=String.fromCharCode(1), M2=String.fromCharCode(2); // ASCII placeholder delimiters (unlikely in prose)
  e=e.replace(/```([^\n`]*)\n([\s\S]*?)```/g,function(_,lang,code){
    fb.push('<pre><code>'+code.replace(/\n$/,'')+'</code></pre>');
    return M1+(fb.length-1)+M2;
  });
  e=e.replace(/`([^`]+)`/g,'<code>$1</code>');
  e=e.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  e=e.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  e=e.replace(/\[([^\]]+)\]\([^)]*\)/g,'<em>$1</em>'); // no nav in these panels: text only
  var lines=e.split('\n'), out=[], inUl=false, inOl=false;
  var sepCellRe=/^:?-+:?$/;
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    // Table: a row with >=1 '|' immediately followed by a |---|:---:|---:| style
    // separator row (same cell count). Lines with '|' but no separator row
    // underneath (e.g. "a | b" prose) fall through untouched.
    if(line.indexOf('|')!==-1 && i+1<lines.length){
      var sepCells=tblCells(lines[i+1]);
      var isSep=sepCells.length>0 && sepCells.every(function(c){return sepCellRe.test(c);});
      var headCells=isSep?tblCells(line):null;
      if(isSep && headCells.length===sepCells.length){
        var align=sepCells.map(tblAlign);
        var rows=[], j=i+2;
        while(j<lines.length && lines[j].trim()!==''&&lines[j].indexOf('|')!==-1){
          rows.push(tblCells(lines[j])); j++;
        }
        if(inUl){out.push('</ul>');inUl=false;}
        if(inOl){out.push('</ol>');inOl=false;}
        var thr='<tr>'+headCells.map(function(c,ci){
          var a=align[ci]; return '<th'+(a?' style="text-align:'+a+'"':'')+'>'+c+'</th>';
        }).join('')+'</tr>';
        var tbr=rows.map(function(r){
          return '<tr>'+headCells.map(function(_,ci){
            var c=r[ci]!==undefined?r[ci]:''; var a=align[ci];
            return '<td'+(a?' style="text-align:'+a+'"':'')+'>'+c+'</td>';
          }).join('')+'</tr>';
        }).join('');
        out.push('<div class="mdTblWrap"><table><thead>'+thr+'</thead><tbody>'+tbr+'</tbody></table></div>');
        i=j-1;
        continue;
      }
    }
    var h=line.match(/^#{1,3}\s+(.*)$/);
    var o=!h&&line.match(/^\s*\d+[.)]\s+(.*)$/);
    var u=!h&&!o&&line.match(/^\s*[-*]\s+(.*)$/);
    if(o){ if(inUl){out.push('</ul>');inUl=false;} if(!inOl){out.push('<ol>');inOl=true;} out.push('<li>'+o[1]+'</li>'); }
    else if(u){ if(inOl){out.push('</ol>');inOl=false;} if(!inUl){out.push('<ul>');inUl=true;} out.push('<li>'+u[1]+'</li>'); }
    else {
      if(inUl){out.push('</ul>');inUl=false;}
      if(inOl){out.push('</ol>');inOl=false;}
      out.push(h?'<div class="mdH"><strong>'+h[1]+'</strong></div>':line);
    }
  }
  if(inUl)out.push('</ul>');
  if(inOl)out.push('</ol>');
  e=out.join('\n');
  e=e.replace(new RegExp(M1+'(\\d+)'+M2,'g'),function(_,idx){return fb[idx];});
  return e;
}

function rz(){
  var t=$t();if(!t)return;
  var d=window.devicePixelRatio||2,el=document.getElementById('drop');
  requestAnimationFrame(function(){
    var h=Math.max(44,Math.min(420,el.offsetHeight));
    t.invoke('resize_agent_panel',{width:Math.round(340*d),height:Math.round(h*d)}).catch(function(){});
  });
}

function render(){
  while(cv.firstChild&&cv.firstChild!==es)cv.removeChild(cv.firstChild);
  while(es.nextSibling)cv.removeChild(es.nextSibling);
  es.style.display=(M.length||rb.classList.contains('on'))?'none':'';
  cv.style.display=(!M.length&&!tk&&rb.classList.contains('on'))?'none':'';
  M.forEach(function(m){cv.appendChild(mk(m))});
  if(tk)cv.appendChild(tk);
  cv.scrollTop=cv.scrollHeight;rz();
}
function mk(m){
  var w=document.createElement('div');
  if(m.t==='sel'){
    w.className='ru';
    var b=document.createElement('div');b.className='bs';
    var sl=document.createElement('span');sl.className='sl';sl.textContent='Selected from '+m.app;
    var st=document.createElement('span');st.className='st';st.textContent=m.x;
    b.append(sl,st);w.appendChild(b);
  }
  else if(m.t==='u'){w.className='ru';var b=document.createElement('div');b.className='bu';b.textContent=m.x;w.appendChild(b)}
  else if(m.t==='a'){
    w.className='ra';
    var col=document.createElement('div');col.style.cssText='max-width:84%;display:flex;flex-direction:column;gap:3px';
    var b=document.createElement('div');b.className='ba';b.innerHTML=md(m.x);
    col.appendChild(b);
    var btns=document.createElement('div');btns.className='rb';
    var cpb=document.createElement('button');cpb.className='rc';cpb.textContent='Copy';
    cpb.onclick=function(){navigator.clipboard.writeText(m.x);cpb.textContent='Copied';setTimeout(function(){cpb.textContent='Copy'},1200)};
    btns.appendChild(cpb);
    col.appendChild(btns);
    w.appendChild(col);
  }
  else if(m.t==='e'){w.className='ra';var b=document.createElement('div');b.className='be';b.textContent=m.x;w.appendChild(b)}
  else if(m.t==='s'){
    var c=document.createElement('div');c.className='sk';
    var d=document.createElement('div');d.className='sd';d.style.background=m.bl?'#ef4444':'#86efac';
    var n=document.createElement('span');n.className='sn';n.textContent=m.sn||'';
    var p=document.createElement('span');p.className='sp';p.textContent=m.pm||'';
    var l=document.createElement('span');l.className='sl';l.textContent=m.ms!=null?m.ms+'ms':'';
    c.append(d,n,p,l);return c;
  }
  return w;
}
function showTk(){if(!tk){tk=document.createElement('div');tk.className='tw';var b=document.createElement('div');b.className='tb';[0,180,360].forEach(function(d){var o=document.createElement('div');o.className='td';o.style.animationDelay=d+'ms';b.appendChild(o)});tk.appendChild(b)}render()}
function hideTk(){tk=null;render()}
function showRec(){rb.classList.add('on');rs=Date.now();if(ri)clearInterval(ri);ri=setInterval(function(){rt.textContent=((Date.now()-rs)/1000).toFixed(1)+'s'},100);render()}
function hideRec(){rb.classList.remove('on');if(ri){clearInterval(ri);ri=null}render()}
function show(p){P=!!p;hd.classList.toggle('on',P);mf.classList.toggle('on',P);pnDismissed=false;checkProviderNotice();render()}
function hide(){iv('hide_agent_panel')}
function clearC(){M=[];hideTk();hideRec();render();iv('agent_reset')}
function chip(b){proc(b.textContent)}
function proc(x){M.push({t:'u',x:x});render();showTk();iv('agent_process',{text:x}).then(function(a){
    if(!a)return;
    if(a.skill_executions)a.skill_executions.forEach(function(ex){
      var ps=typeof ex.params==='object'?Object.values(ex.params||{}).slice(0,2).map(String).join(' '):String(ex.params||'');
      recvSkillExec(ex.skill_name,ps,ex.latency_ms,ex.blocked);
    });
    if(a.response_text)recvResponse(a.response_text);
  }).catch(function(e){recvError(String(e))})}
function mic(){
  if(!$t())return;
  if(ma){
    // Second tap: stop recording, transcribe, run agent
    ma=false;mb.classList.remove('act');
    recvRecordingStop();
    iv('stop_recording',{mode_override:'agent'}).then(function(r){
      if(!r||!r.text)return;
      recvUserMessage(r.text);
      recvThinking();
      iv('agent_process',{text:r.text}).then(function(a){
        if(!a)return;
        if(a.skill_executions)a.skill_executions.forEach(function(ex){
          var ps=typeof ex.params==='object'?Object.values(ex.params||{}).slice(0,2).map(String).join(' '):String(ex.params||'');
          recvSkillExec(ex.skill_name,ps,ex.latency_ms,ex.blocked);
        });
        if(a.response_text)recvResponse(a.response_text);
      }).catch(function(e){recvError(String(e))});
    }).catch(function(e){recvError(String(e))});
  } else {
    // First tap: stop any TTS, start recording
    ma=true;mb.classList.add('act');
    iv('stop_playback');
    recvRecording();
    iv('start_recording',{skip_float:true}).catch(function(e){
      ma=false;mb.classList.remove('act');recvError(String(e));
    });
  }
}

/* ── Global functions called directly by Rust via webview.evaluate_script() ── */
/* These bypass the Tauri event system entirely — much more reliable. */
function recvRecording(){hideTk();showRec()}
function recvRecordingStop(){hideRec()}
function recvUserMessage(text){M.push({t:'u',x:text});hideRec();render();showTk()}
function recvThinking(){showTk()}
function recvSkillExec(name,params,ms,blocked){M.push({t:'s',sn:name||'',pm:params||'',ms:ms,bl:!!blocked});render()}
function recvSelection(text,app){M.push({t:'sel',x:text,app:app||''});render()}
function recvResponse(text,canReplace){hideTk();M.push({t:'a',x:text,rep:!!canReplace});ma=false;mb.classList.remove('act');render()}
function recvError(text){hideTk();M.push({t:'e',x:text||'Error'});render()}
function recvDismiss(){hide()}
function recvShow(persistent){show(!!persistent)}
function recvClear(){clearC()}

/* Event listeners kept as fallback (for test harness compatibility) */
function setup(){
  var t=$t();if(!t){setTimeout(setup,100);return}
  iv('get_config').then(function(c){applyLocale(c&&c.ui_language)}).catch(function(){});
  var tr=t.transformCallback;
  function on(e,f){t.invoke('plugin:event|listen',{event:e,target:{kind:'Any'},handler:tr(f)}).catch(function(x){console.error('listen:'+e,x)})}
  on('agent-panel:show',function(e){show(e&&e.payload&&e.payload.persistent)});
  on('agent-panel:hide',function(){hide()});
  on('agent-panel:recording',function(){recvRecording()});
  on('agent-panel:recording-stop',function(){recvRecordingStop()});
  on('agent-panel:user-message',function(e){var x=e&&e.payload&&e.payload.text;if(x)recvUserMessage(x)});
  on('agent-panel:thinking',function(){recvThinking()});
  on('agent-panel:skill-execution',function(e){var p=e&&e.payload||{};var ps=typeof p.params==='object'?Object.values(p.params||{}).slice(0,2).map(String).join(' '):String(p.params||'');recvSkillExec(p.skill_name,ps,p.latency_ms,p.blocked)});
  on('agent-panel:response',function(e){var p=e&&e.payload||{};if(p.text)recvResponse(p.text)});
  on('agent-panel:error',function(e){var x=e&&e.payload&&e.payload.text||'Error';recvError(x)});
  on('agent-panel:clear',function(){recvClear()});
  on('agent-panel:dismiss',function(){recvDismiss()});
  // Settings changed while the panel is open (finding 3): re-evaluate the #69
  // provider notice against the freshly-saved config and live-update the notice
  // locale — mirrors float.html's config:saved listener. checkProviderNotice
  // re-queries the backend, so the small emitted payload subset
  // (ui_language/active_voice_workflow) is used only for the locale here. A
  // prior dismiss (pnDismissed) is deliberately preserved: dismiss is per-open
  // and this is the same open — show() stays the only reset point.
  on('config:saved',function(e){var p=e&&e.payload;if(!p)return;applyLocale(p.ui_language);checkProviderNotice();});
  render();
}
document.readyState==='loading'?document.addEventListener('DOMContentLoaded',function(){setTimeout(setup,40)}):setTimeout(setup,40);
</script>
</body>
</html>
